name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.26.x"
  CGO_ENABLED: "0"

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test -count=1 ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          name="mcpipe-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/$name" ./cmd/mcpipe
          (cd dist && sha256sum "$name" > "$name.sha256")

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpipe-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/mcpipe-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            dist/mcpipe-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256
          if-no-files-found: error

  publish:
    name: publish
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
